{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="page-content">
  <div class="container content-body">
    {{ .Content }}
  </div>
</section>
{{ end }}
